name: build-rss

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时跑一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate RSS
        run: python generate_rss.py

      - name: Commit RSS
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add follow_builders_rss.xml
          git diff --cached --quiet || git commit -m "update rss"
          git push